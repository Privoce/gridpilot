iso: MISO
name: MISO + AES Indiana (demo)
description: >
  Midcontinent Independent System Operator generator interconnection with AES Indiana
  Facilities Connection Requirements overlays used in the GridPilot demo.
version: "2026.1-aes-indiana"
references:
  - FERC Order 2023
  - MISO BPM-015 Generator Interconnection
  - AES Indiana Facilities Connection Requirements (2026)
  - FERC Order 842 (primary frequency response)
  - NERC VAR-002
  - IEEE 1547-2018
rules:
  - id: R-POI-01
    severity: blocking
    title: POI voltage and ownership boundary labeled
    check: poi_and_metering
    description: AES Indiana / MISO exhibits require POI voltage, metering, and ownership demarcation on the SLD.
    recommendation: Label POI kV, revenue meter, and ownership line clearly.

  - id: R-PROTECT-01
    severity: blocking
    title: Protective relays with ANSI function numbers
    check: ansi_relay_labels
    description: All relays must be labeled with ANSI device numbers (27/59/81/67, etc.).
    recommendation: Annotate each relay with ANSI function numbers for AES Indiana review.

  - id: R-METER-01
    severity: blocking
    title: CT/PT ratios at POI metering
    check: ct_pt_ratios
    description: CT and PT ratios must be shown for interconnection revenue metering.
    recommendation: Add CT/PT ratios matching the metering design package.

  - id: R-IBR-01
    severity: blocking
    title: IBR P-Q / capability curves
    check: ibr_capability
    description: >
      New IBRs on AES Indiana must document reactive capability / P-Q curves, primary frequency
      response (FERC 842, ≤5% droop outside ±0.036 Hz deadband), and closed-loop voltage control
      (NERC VAR-002, POI voltage within ±2%).
    recommendation: Attach P-Q capability, PFR/droop, and AVC notes from inverter data.

  - id: R-TITLE-01
    severity: warning
    title: As-built revision and date
    check: title_revision_date
    description: AES Indiana requires as-built one-lines with revision number and date before energization.
    recommendation: Complete revision letter, date, and as-built stamp.

  - id: R-METER-02
    severity: warning
    title: Bidirectional AES Indiana meter labeling
    check: bidirectional_meter
    description: Bidirectional revenue metering at the AES Indiana POI should be explicitly labeled.
    recommendation: Call out bidirectional metering and utility meter identification.

  - id: MISO-XFMR-001
    severity: warning
    title: Interconnecting transformer data
    check: transformer_mva
    description: Transformer MVA, impedance (%Z), and voltage ratios support MISO study modeling.
    recommendation: Annotate MVA, %Z, and kV ratio on each GSU / station transformer.

  - id: MISO-CAP
    severity: warning
    title: Project MW vs equipment schedule
    check: capacity_consistency
    description: Stated project MW should match inverter/transformer equipment totals.
    recommendation: Align title-block MW with equipment schedule totals.
